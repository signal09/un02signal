<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Ishan - Live Crypto Dashboard</title>
    <style>
        :root {
            --bg: #06060f;
            --bg2: #0d0d1f;
            --card: rgba(14, 14, 35, 0.95);
            --border: rgba(255,255,255,0.05);
            --primary: #00d4ff;
            --purple: #7c3aed;
            --pink: #f472b6;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --muted: #64748b;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === BG GLOW === */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-glow .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
        }
        .bg-glow .orb1 { width: 500px; height: 500px; background: var(--primary); top: -100px; left: -100px; animation: orbFloat 15s ease-in-out infinite; }
        .bg-glow .orb2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; right: -100px; animation: orbFloat 20s ease-in-out infinite reverse; }
        .bg-glow .orb3 { width: 300px; height: 300px; background: var(--pink); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: orbFloat 18s ease-in-out infinite 3s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.9); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        .page { position: relative; z-index: 1; }

        /* === HEADER === */
        .header {
            text-align: center; padding: 28px 20px 12px;
        }
        .logo-row {
            display: inline-flex; align-items: center; gap: 12px;
        }
        .logo-box {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 30px rgba(0,212,255,0.25);
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow: 0 0 20px rgba(0,212,255,0.2); }
            50% { box-shadow: 0 0 40px rgba(0,212,255,0.4); }
        }
        .logo-text {
            font-size: 26px; font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--purple), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline { color: var(--muted); font-size: 13px; margin-top: 4px; }

        /* === CONTAINER === */
        .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

        /* === STATUS BAR === */
        .status-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; border-radius: 12px; margin-bottom: 16px;
            background: rgba(0,212,255,0.04); border: 1px solid var(--border);
            font-size: 12px; flex-wrap: wrap; gap: 8px;
        }
        .status-left { display: flex; align-items: center; gap: 6px; }
        .dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--green);
            box-shadow: 0 0 8px rgba(16,185,129,0.5);
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .status-right { color: var(--muted); }

        /* === STAT CARDS === */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; text-align: center;
            transition: all 0.3s;
        }
        .stat-card:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-2px); }
        .stat-icon { font-size: 22px; margin-bottom: 6px; }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        /* Fear & Greed specific */
        .fng-bar { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.05); margin-top: 8px; overflow: hidden; }
        .fng-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }

        /* === SECTION TITLES === */
        .section-title {
            font-size: 16px; font-weight: 700; margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px; color: var(--primary);
        }

        /* === MOVERS === */
        .movers-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
        }
        .movers-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px;
        }
        .movers-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .mover-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid var(--border);
        }
        .mover-item:last-child { border-bottom: none; }
        .mover-left { display: flex; align-items: center; gap: 8px; }
        .mover-img { width: 22px; height: 22px; border-radius: 50%; }
        .mover-name { font-size: 13px; font-weight: 600; }
        .mover-symbol { font-size: 11px; color: var(--muted); }
        .mover-change { font-size: 13px; font-weight: 700; }

        /* === PRICE TABLE === */
        .price-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
        }
        .price-table { width: 100%; border-collapse: collapse; }
        .price-table th {
            padding: 12px 16px; text-align: left; font-size: 11px;
            color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2);
        }
        .price-table td {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            font-size: 14px; transition: background 0.2s;
        }
        .price-table tr:hover td { background: rgba(0,212,255,0.03); }
        .price-table tr:last-child td { border-bottom: none; }

        .coin-cell { display: flex; align-items: center; gap: 10px; }
        .coin-img { width: 28px; height: 28px; border-radius: 50%; }
        .coin-info .name { font-weight: 600; font-size: 14px; }
        .coin-info .symbol { color: var(--muted); font-size: 11px; }
        .rank { color: var(--muted); font-size: 12px; width: 24px; text-align: center; }
        .price-val { font-weight: 600; font-variant-numeric: tabular-nums; }
        .change { font-weight: 600; font-size: 13px; padding: 3px 8px; border-radius: 6px; display: inline-block; }
        .change.up { color: var(--green); background: rgba(16,185,129,0.1); }
        .change.down { color: var(--red); background: rgba(239,68,68,0.1); }
        .mcap { color: var(--muted); font-size: 13px; }

        .table-scroll { overflow-x: auto; }
        .price-table th:nth-child(4), .price-table td:nth-child(4) { text-align: right; }
        .price-table th:nth-child(3), .price-table td:nth-child(3) { text-align: right; }
        .price-table th:nth-child(5), .price-table td:nth-child(5) { text-align: right; }

        /* === NEWS === */
        .news-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
        }
        .summary-box {
            background: linear-gradient(135deg, rgba(0,212,255,0.06), rgba(124,58,237,0.06));
            border: 1px solid rgba(0,212,255,0.12);
            border-radius: 12px; padding: 18px; margin-bottom: 16px;
            line-height: 1.8; font-size: 14px; white-space: pre-wrap;
            animation: fadeUp 0.6s ease;
        }
        .summary-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--purple);
            background: rgba(124,58,237,0.12); padding: 4px 10px;
            border-radius: 20px; margin-bottom: 10px;
        }

        .news-item {
            padding: 14px 0; border-bottom: 1px solid var(--border);
            animation: fadeUp 0.5s ease both;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item a {
            text-decoration: none; color: var(--text); font-size: 14px;
            font-weight: 500; display: block; transition: color 0.2s; line-height: 1.5;
        }
        .news-item a:hover { color: var(--primary); }
        .news-meta {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; color: var(--muted); margin-top: 5px;
        }
        .news-source {
            background: rgba(255,255,255,0.05); padding: 2px 8px;
            border-radius: 4px; font-size: 10px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === BUTTONS === */
        .btn-bar {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 10px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; display: inline-flex;
            align-items: center; gap: 6px; color: white;
        }
        .btn-refresh {
            background: linear-gradient(135deg, var(--primary), var(--purple));
        }
        .btn-refresh:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,212,255,0.3); }
        .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-refresh .spin { display: inline-block; transition: transform 0.3s; }
        .btn-refresh.loading .spin { animation: spinIcon 1s linear infinite; }
        @keyframes spinIcon { to { transform: rotate(360deg); } }

        /* === LOADER === */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
        .skeleton-row { height: 52px; margin-bottom: 4px; }
        .skeleton-stat { height: 80px; }
        .skeleton-news { height: 60px; margin-bottom: 8px; }

        /* === TOAST === */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--card); border: 1px solid rgba(0,212,255,0.2);
            color: var(--text); padding: 10px 20px; border-radius: 10px;
            font-size: 13px; z-index: 999; transition: transform 0.4s ease;
            backdrop-filter: blur(12px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* === FOOTER === */
        .footer {
            text-align: center; padding: 30px 20px; color: #333;
            font-size: 12px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 700px) {
            .movers-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .price-table th:nth-child(5), .price-table td:nth-child(5) { display: none; }
            .container { padding: 10px; }
            .logo-text { font-size: 22px; }
        }
        @media (max-width: 400px) {
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .stat-card { padding: 12px; }
            .stat-value { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="bg-glow">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
</div>

<div class="page">
    <!-- HEADER -->
    <div class="header">
        <div class="logo-row">
            <div class="logo-box">🤖</div>
            <span class="logo-text">Bot Ishan</span>
        </div>
        <p class="tagline">Live Crypto Dashboard — Auto Updates • No API Key Needed</p>
    </div>

    <div class="container">

        <!-- STATUS BAR -->
        <div class="status-bar">
            <div class="status-left">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Initializing...</span>
            </div>
            <div class="status-right" id="clock"></div>
        </div>

        <!-- BUTTONS -->
        <div class="btn-bar">
            <button class="btn btn-refresh" id="refreshBtn" onclick="refreshAll()">
                <span class="spin">🔄</span> Refresh All
            </button>
        </div>

        <!-- STATS -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
        </div>

        <!-- MOVERS -->
        <div class="movers-grid" id="moversGrid">
            <div class="movers-card skeleton skeleton-stat" style="height:160px"></div>
            <div class="movers-card skeleton skeleton-stat" style="height:160px"></div>
        </div>

        <!-- PRICES -->
        <div class="section-title">💰 Live Prices — Top 20</div>
        <div class="price-card">
            <div class="table-scroll">
                <table class="price-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Coin</th>
                            <th>Price</th>
                            <th>24h %</th>
                            <th>Market Cap</th>
                        </tr>
                    </thead>
                    <tbody id="priceBody">
                        <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
                        <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
                        <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
                        <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
                        <tr><td colspan="5"><div class="skeleton skeleton-row"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- NEWS -->
        <div class="section-title">📰 Latest Crypto News</div>
        <div class="news-card">
            <div id="summaryArea"></div>
            <div id="newsArea">
                <div class="skeleton skeleton-news"></div>
                <div class="skeleton skeleton-news"></div>
                <div class="skeleton skeleton-news"></div>
                <div class="skeleton skeleton-news"></div>
            </div>
        </div>

    </div>

    <div class="footer">🤖 Bot Ishan © 2025 — Fully Automatic • No API Keys Required</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================
// STATE
// ============================
let coinData = [];
let newsData = [];
let isLoading = false;

// ============================
// INIT — Auto start everything
// ============================
window.addEventListener('DOMContentLoaded', () => {
    updateClock();
    setInterval(updateClock, 1000);
    refreshAll();

    // Auto refresh: prices every 60s, news every 5 min
    setInterval(fetchPrices, 60000);
    setInterval(fetchNews, 300000);
});

// ============================
// REFRESH ALL
// ============================
async function refreshAll() {
    if (isLoading) return;
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    btn.disabled = true;
    setStatus('Fetching data...');

    await Promise.all([fetchPrices(), fetchFearGreed(), fetchNews()]);

    btn.classList.remove('loading');
    btn.disabled = false;
    const now = new Date().toLocaleTimeString();
    setStatus('Live — Updated ' + now);
    showToast('✅ All data updated!');
}

// ============================
// FETCH PRICES (CoinCap API — Free, No Key)
// ============================
async function fetchPrices() {
    try {
        const res = await fetch('https://api.coincap.io/v2/assets?limit=20');
        const json = await res.json();
        coinData = json.data;
        renderPrices();
        renderStats();
        renderMovers();
    } catch (err) {
        console.error('Price fetch error:', err);
        try {
            // Fallback: proxy
            const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.coincap.io/v2/assets?limit=20'));
            const json = await res.json();
            coinData = json.data;
            renderPrices();
            renderStats();
            renderMovers();
        } catch (e2) {
            showToast('❌ Price fetch failed');
        }
    }
}

// ============================
// RENDER PRICES TABLE
// ============================
function renderPrices() {
    const tbody = document.getElementById('priceBody');
    tbody.innerHTML = coinData.map((c, i) => {
        const price = parseFloat(c.priceUsd);
        const change = parseFloat(c.changePercent24Hr);
        const mcap = parseFloat(c.marketCapUsd);
        const isUp = change >= 0;
        const symbol = c.symbol.toLowerCase();
        return `
        <tr style="animation: fadeUp 0.3s ease ${i * 0.03}s both">
            <td><span class="rank">${c.rank}</span></td>
            <td>
                <div class="coin-cell">
                    <img class="coin-img" src="https://assets.coincap.io/assets/icons/${symbol}@2x.png"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><circle cx=%2220%22 cy=%2220%22 r=%2220%22 fill=%22%231a1a3e%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 fill=%22%2300d4ff%22 font-size=%2214%22>${c.symbol.charAt(0)}</text></svg>'" />
                    <div class="coin-info">
                        <div class="name">${c.name}</div>
                        <div class="symbol">${c.symbol}</div>
                    </div>
                </div>
            </td>
            <td class="price-val">${formatPrice(price)}</td>
            <td><span class="change ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%</span></td>
            <td class="mcap">${formatLargeNum(mcap)}</td>
        </tr>`;
    }).join('');
}

// ============================
// RENDER GLOBAL STATS
// ============================
function renderStats() {
    if (!coinData.length) return;

    let totalMcap = 0, totalVol = 0;
    coinData.forEach(c => {
        totalMcap += parseFloat(c.marketCapUsd || 0);
        totalVol += parseFloat(c.volumeUsd24Hr || 0);
    });

    const btcMcap = parseFloat(coinData[0]?.marketCapUsd || 0);
    const btcDom = totalMcap > 0 ? ((btcMcap / totalMcap) * 100).toFixed(1) : '—';

    // Count positive coins
    const upCount = coinData.filter(c => parseFloat(c.changePercent24Hr) >= 0).length;
    const marketMood = upCount >= 14 ? '🟢 Bullish' : upCount >= 8 ? '🟡 Mixed' : '🔴 Bearish';

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
            <div class="stat-icon">💎</div>
            <div class="stat-label">Market Cap</div>
            <div class="stat-value">${formatLargeNum(totalMcap)}</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-label">24h Volume</div>
            <div class="stat-value">${formatLargeNum(totalVol)}</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">₿</div>
            <div class="stat-label">BTC Dominance</div>
            <div class="stat-value">${btcDom}%</div>
        </div>
        <div class="stat-card" id="fngCard">
            <div class="stat-icon">😐</div>
            <div class="stat-label">Market Mood</div>
            <div class="stat-value" style="font-size:14px">${marketMood}</div>
        </div>
    `;
}

// ============================
// FETCH FEAR & GREED
// ============================
async function fetchFearGreed() {
    try {
        let data;
        try {
            const res = await fetch('https://api.alternative.me/fng/?limit=1');
            data = await res.json();
        } catch {
            const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.alternative.me/fng/?limit=1'));
            data = await res.json();
        }

        if (data && data.data && data.data[0]) {
            const fng = data.data[0];
            const val = parseInt(fng.value);
            const label = fng.value_classification;
            let color = var_yellow;
            if (val <= 25) color = '#ef4444';
            else if (val <= 45) color = '#f97316';
            else if (val <= 55) color = '#f59e0b';
            else if (val <= 75) color = '#84cc16';
            else color = '#10b981';

            const fngCard = document.getElementById('fngCard');
            if (fngCard) {
                const emoji = val <= 25 ? '😱' : val <= 45 ? '😟' : val <= 55 ? '😐' : val <= 75 ? '😊' : '🤑';
                fngCard.innerHTML = `
                    <div class="stat-icon">${emoji}</div>
                    <div class="stat-label">Fear & Greed</div>
                    <div class="stat-value" style="font-size:16px">${val} — ${label}</div>
                    <div class="fng-bar"><div class="fng-fill" style="width:${val}%; background:${color}"></div></div>
                `;
            }
        }
    } catch (err) {
        console.log('FNG fetch skipped:', err.message);
    }
}

// Fix the color reference issue
const var_yellow = '#f59e0b';

// ============================
// RENDER MOVERS (Gainers & Losers)
// ============================
function renderMovers() {
    if (!coinData.length) return;

    const sorted = [...coinData].sort((a, b) => parseFloat(b.changePercent24Hr) - parseFloat(a.changePercent24Hr));
    const gainers = sorted.slice(0, 3);
    const losers = sorted.slice(-3).reverse();

    function renderMoverList(items) {
        return items.map(c => {
            const change = parseFloat(c.changePercent24Hr);
            const isUp = change >= 0;
            const sym = c.symbol.toLowerCase();
            return `
            <div class="mover-item">
                <div class="mover-left">
                    <img class="mover-img" src="https://assets.coincap.io/assets/icons/${sym}@2x.png"
                         onerror="this.style.display='none'" />
                    <div>
                        <div class="mover-name">${c.name}</div>
                        <div class="mover-symbol">${c.symbol}</div>
                    </div>
                </div>
                <div class="mover-change" style="color:${isUp ? 'var(--green)' : 'var(--red)'}">
                    ${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%
                </div>
            </div>`;
        }).join('');
    }

    document.getElementById('moversGrid').innerHTML = `
        <div class="movers-card">
            <div class="movers-title">🚀 Top Gainers (24h)</div>
            ${renderMoverList(gainers)}
        </div>
        <div class="movers-card">
            <div class="movers-title">📉 Top Losers (24h)</div>
            ${renderMoverList(losers)}
        </div>
    `;
}

// ============================
// FETCH NEWS (CryptoCompare — Free, No Key)
// ============================
async function fetchNews() {
    try {
        let data;
        try {
            const res = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&sortOrder=latest');
            data = await res.json();
        } catch {
            const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://min-api.cryptocompare.com/data/v2/news/?lang=EN&sortOrder=latest'));
            data = await res.json();
        }

        if (data && data.Data) {
            newsData = data.Data.slice(0, 12);
            renderNews();
            renderSmartSummary();
        }
    } catch (err) {
        console.error('News fetch error:', err);
        document.getElementById('newsArea').innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">⚠️ Could not load news. Will retry...</p>';
    }
}

// ============================
// RENDER NEWS
// ============================
function renderNews() {
    document.getElementById('newsArea').innerHTML = newsData.map((n, i) => {
        const time = new Date(n.published_on * 1000);
        const ago = timeAgo(time);
        return `
        <div class="news-item" style="animation-delay:${i * 0.05}s">
            <a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>
            <div class="news-meta">
                <span class="news-source">${n.source}</span>
                <span>🕐 ${ago}</span>
                ${n.categories ? `<span>🏷 ${n.categories.split('|').slice(0,3).join(', ')}</span>` : ''}
            </div>
        </div>`;
    }).join('');
}

// ============================
// SMART SUMMARY (No AI API needed!)
// ============================
function renderSmartSummary() {
    if (!newsData.length) return;

    const headlines = newsData.map(n => n.title);

    // Keyword analysis
    const cryptos = {
        'bitcoin': 'Bitcoin', 'btc': 'Bitcoin', 'ethereum': 'Ethereum', 'eth': 'Ethereum',
        'solana': 'Solana', 'sol': 'Solana', 'xrp': 'XRP', 'cardano': 'Cardano',
        'dogecoin': 'Dogecoin', 'doge': 'Dogecoin', 'bnb': 'BNB', 'polygon': 'Polygon',
        'avalanche': 'Avalanche', 'polkadot': 'Polkadot', 'chainlink': 'Chainlink',
        'shiba': 'Shiba Inu', 'tron': 'TRON', 'litecoin': 'Litecoin', 'sui': 'SUI',
        'pepe': 'PEPE', 'ton': 'TON', 'near': 'NEAR'
    };

    const bullWords = ['surge', 'rally', 'rise', 'gain', 'bullish', 'soar', 'high', 'jump',
        'pump', 'record', 'launch', 'approve', 'adopt', 'grow', 'boost', 'milestone',
        'breakout', 'positive', 'up', 'moon', 'ath', 'all-time', 'winning', 'buy'];
    const bearWords = ['crash', 'drop', 'fall', 'decline', 'bearish', 'plunge', 'dump',
        'low', 'ban', 'hack', 'scam', 'fraud', 'down', 'sell', 'warning', 'risk',
        'loss', 'slump', 'tumble', 'fear', 'concern', 'threat', 'reject', 'lawsuit'];

    let mentionedCoins = {};
    let bullScore = 0, bearScore = 0;
    let keyTopics = [];

    headlines.forEach(h => {
        const lower = h.toLowerCase();

        // Find coins
        Object.keys(cryptos).forEach(key => {
            if (lower.includes(key) && !mentionedCoins[cryptos[key]]) {
                mentionedCoins[cryptos[key]] = true;
            }
        });

        // Score sentiment
        bullWords.forEach(w => { if (lower.includes(w)) bullScore++; });
        bearWords.forEach(w => { if (lower.includes(w)) bearScore++; });

        // Collect key topics
        if (lower.includes('etf')) keyTopics.push('ETF');
        if (lower.includes('sec') || lower.includes('regulation')) keyTopics.push('Regulation');
        if (lower.includes('defi')) keyTopics.push('DeFi');
        if (lower.includes('nft')) keyTopics.push('NFT');
        if (lower.includes('ai') || lower.includes('artificial')) keyTopics.push('AI');
        if (lower.includes('hack') || lower.includes('exploit')) keyTopics.push('Security');
        if (lower.includes('whale')) keyTopics.push('Whale Activity');
        if (lower.includes('fed') || lower.includes('rate')) keyTopics.push('Macro/Fed');
    });

    // Build summary
    let summary = '';

    // Mood
    const net = bullScore - bearScore;
    if (net > 4) summary += '🟢 Overall Mood: Very Bullish\n';
    else if (net > 1) summary += '🟢 Overall Mood: Bullish\n';
    else if (net > -2) summary += '🟡 Overall Mood: Neutral/Mixed\n';
    else if (net > -5) summary += '🔴 Overall Mood: Bearish\n';
    else summary += '🔴 Overall Mood: Very Bearish\n';

    // Trending coins
    const coins = Object.keys(mentionedCoins);
    if (coins.length > 0) {
        summary += `\n🪙 Trending: ${coins.slice(0, 5).join(', ')}\n`;
    }

    // Topics
    const uniqueTopics = [...new Set(keyTopics)];
    if (uniqueTopics.length > 0) {
        summary += `📋 Hot Topics: ${uniqueTopics.slice(0, 4).join(' • ')}\n`;
    }

    // Top 3 headlines
    summary += '\n🔥 Top Headlines:\n';
    headlines.slice(0, 4).forEach((h, i) => {
        const lower = h.toLowerCase();
        let emoji = '📌';
        if (bullWords.some(w => lower.includes(w))) emoji = '🚀';
        else if (bearWords.some(w => lower.includes(w))) emoji = '📉';
        summary += `${emoji} ${h}\n`;
    });

    // Stats
    summary += `\n📊 Sentiment: ${bullScore} bullish vs ${bearScore} bearish signals from ${headlines.length} headlines`;

    document.getElementById('summaryArea').innerHTML = `
        <div class="summary-box">
            <div class="summary-badge">🤖 Smart Auto Summary</div>
            <div>${summary}</div>
        </div>
    `;
}

// ============================
// UTILITY FUNCTIONS
// ============================
function formatPrice(p) {
    if (p >= 1) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 0.01) return '$' + p.toFixed(4);
    if (p >= 0.0001) return '$' + p.toFixed(6);
    return '$' + p.toFixed(8);
}

function formatLargeNum(n) {
    if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
    if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
    return '$' + n.toFixed(2);
}

function timeAgo(date) {
    const diff = Math.floor((Date.now() - date.getTime()) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
        ' • ' + now.toLocaleTimeString();
}

function setStatus(text) {
    document.getElementById('statusText').textContent = text;
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
